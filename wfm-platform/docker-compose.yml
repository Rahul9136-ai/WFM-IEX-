# Local development stack. Production uses Kubernetes (added in the deployment module).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfm
      POSTGRES_DB: wfm
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes: ["./backend:/app"]
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app.celery worker --loglevel=info
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes: ["./backend:/app"]
    depends_on:
      redis: { condition: service_healthy }
      db: { condition: service_healthy }

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
